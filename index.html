<!DOCTYPE html>
<html>
<head>
    <title>Student Course Feedback</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 style="color: white;">Student Course Feedback</h1>

    <form id="feedbackForm">

        <input type="text" id="name" placeholder="Enter your name" required><br><br>

        <input type="email" id="email" placeholder="Enter your email" required><br><br>

        <input type="text" id="course" placeholder="Enter your course" required><br><br>

        <input type="text" id="department" placeholder="Enter your department" required><br><br>

        <input type="text" id="faculty" placeholder="Enter faculty name" required><br><br>

        <input type="number" id="rating" placeholder="Rate (1-5)" min="1" max="5" required><br><br>

        <textarea id="message" placeholder="Enter your feedback" required></textarea><br><br>

        <button type="submit">Submit</button>

    </form>

    <!-- Footer (Mini Portfolio) -->

        <p><b>Developed by:</b> Anagh Krishna K</p>

        <p>Kristu Jayanti University, Bengaluru</p>
        <p>Academic Year: 2025–2028</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
